<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter + Camera</title>
<style>
body { margin:0; font-family:Arial; background:black; color:white; }
.container { display:flex; flex-direction:column; height:100vh; }
.display { flex:1; overflow:hidden; position:relative; }
.text { position:absolute; width:100%; text-align:center; padding:0 10px; }
.controls { background:purple; padding:10px; display:flex; flex-direction:column; gap:10px; }
label { display:flex; justify-content:space-between; }
textarea { width:100%; height:120px; background:#111; color:white; border:none; padding:10px; }
button { padding:8px; border:none; border-radius:5px; }
video { position:absolute; bottom:10px; right:10px; width:140px; border:2px solid white; border-radius:10px; }
.notice { font-size:12px; color:#ccc; }
</style>
</head>
<body>

<div class="container">

<div class="display">
    <div id="outputText" class="text"></div>
    <video id="preview" autoplay playsinline muted></video>
</div>

<div class="controls">
    <label>Font Size <input type="range" id="fontSize" min="20" max="100" value="40"><span id="fontSizeValue">40</span></label>
    <label>Speed <input type="range" id="speed" min="1" max="10" value="3"><span id="speedValue">3</span></label>
    <button onclick="initCamera()">Enable Camera</button>
    <button onclick="toggleScroll()" id="toggleBtn">Start</button>
    <div class="notice">⚠️ Camera works only on HTTPS or localhost. Allow permission.</div>
</div>

<textarea id="inputText" placeholder="Paste your script here..."></textarea>

</div>

<script>
let scrollInterval;
let position = window.innerHeight;
let isScrolling = false;

let mediaRecorder;
let recordedChunks = [];
let stream;
let cameraReady = false;

async function initCamera() {
    try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("Camera not supported in this browser");
            return;
        }

        stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 1280, height: 720, facingMode: 'user' },
            audio: true
        });

        const video = document.getElementById('preview');
        video.srcObject = stream;
        await video.play();

        cameraReady = true;
        alert("Camera Enabled ✅");

    } catch (err) {
        console.error(err);
        if (err.name === "NotAllowedError") {
            alert("❌ Permission denied. Please allow camera access and use HTTPS.");
        } else {
            alert("Camera error: " + err.message);
        }
    }
}

function startRecording() {
    if (!cameraReady) return;

    let options = { mimeType: 'video/webm' };
    if (MediaRecorder.isTypeSupported('video/mp4')) {
        options = { mimeType: 'video/mp4' };
    }

    mediaRecorder = new MediaRecorder(stream, options);
    recordedChunks = [];

    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = mediaRecorder.mimeType.includes('mp4') ? 'recording.mp4' : 'recording.webm';
        a.click();

        setTimeout(() => URL.revokeObjectURL(url), 100);
    };

    mediaRecorder.start();
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
    }
}

function toggleScroll() {
    const btn = document.getElementById('toggleBtn');

    if (!isScrolling) {
        startScroll();
        startRecording();
        btn.innerText = 'Stop';
    } else {
        stopScroll();
        stopRecording();
        btn.innerText = 'Start';
    }

    isScrolling = !isScrolling;
}

function startScroll() {
    const text = document.getElementById('inputText').value;
    const output = document.getElementById('outputText');

    output.innerText = text;
    position = window.innerHeight;

    clearInterval(scrollInterval);

    scrollInterval = setInterval(() => {
        const speed = document.getElementById('speed').value;
        position -= speed;
        output.style.top = position + 'px';

        if (position < -output.offsetHeight) {
            toggleScroll();
        }

    }, 50);
}

function stopScroll() {
    clearInterval(scrollInterval);
}

fontSize.oninput = function() {
    outputText.style.fontSize = this.value + 'px';
    fontSizeValue.innerText = this.value;
};

speed.oninput = function() {
    speedValue.innerText = this.value;
};

// Basic test cases (console)
console.assert(typeof toggleScroll === 'function', 'toggleScroll should exist');
console.assert(document.getElementById('inputText'), 'Textarea exists');
console.assert(document.getElementById('preview'), 'Video preview exists');
</script>

</body>
</html>
